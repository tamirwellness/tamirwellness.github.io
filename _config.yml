# Site settings
title: Tamir Wellness Tourist Camp
email: info@tamirwellness.com
url: "https://www.tamirwellness.com"
description: >- # this means to ignore newlines until "baseurl:"
  Tamir Wellness Tourist Camp is located in Terelj National Park, one of the most beautiful places in Mongolia. Visit us during your Mongolia trip.
keywords: "travel, mongolia, tamirwellness, touristcamp"

# Contact form:
# - static : pass through formspree.io to validate email sending
# - disqus : replace contact form by disqus thread
# - comment the line below if you want to stick with the default PHP contact form
contact: static

# Color settings (hex-codes without the leading hash-tag)
color:
  primary: 18bc9c #80B3FF
  primary-rgb: "24,288,156" #"128,179,255"
  secondary: 2c3e50 #FD6E8A
  secondary-dark: 233140 #A2122F

# Footer settings
footer:
  copyright: Tamir Wellness
  location: Location
  social: Around the Web
  credits: Credits

# Social networks usernames (many more available: google-plus, flickr, dribbble, pinterest, instagram, tumblr, linkedin, etc.)
social:
  - title: twitter
    url: http://twitter.com/tamirwellness
  - title: facebook
    url: http://facebook.com/tamirwellness
  - title: tripadvisor
    url: https://www.tripadvisor.com/Hotel_Review-g1236128-d2158092-Reviews-Tamir_Wellness_Tourist_Camp-Gorkhi_Terelj_National_Park_Tov_Province.html

# Postal address (add as many lines as necessary)
address:
  - line: Ar Khuushiin Am
  - line: Terelj, Mongolia

# Credits content
credits: 'Powered by <a href="https://github.com/jeromelachaud/freelancer-theme">Freelancer theme</a>'

# Build settings
markdown: kramdown
permalink: pretty

#for posts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      permalink: ""
